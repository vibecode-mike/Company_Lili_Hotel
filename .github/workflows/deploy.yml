name: Deploy to VM                                                                                            
on:                                                                                                           
    push:                                                                                                       
      branches: [main]                                                                                          
                  
  jobs:
    deploy:                                                                                                     
      runs-on: ubuntu-latest                                                                                    
      steps:                                                                                                    
        - name: Deploy via SSH                                                                                  
          uses: appleboy/ssh-action@v1                                                                          
          with:                                                                                                 
            host: ${{ secrets.VM_HOST }}
            username: ${{ secrets.VM_USER }}                                                                    
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script: |
              cd /path/to/your/app                                                                              
              git pull origin main
              # 重啟服務，例如：                                                                                
              # npm install && pm2 restart app                                                                  
              # docker compose up -d --build     
