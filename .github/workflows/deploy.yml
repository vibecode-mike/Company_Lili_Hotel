  name: Deploy to VM
                                                                                                                
  on:             
    push:
      branches: [main]

  concurrency:
    group: deploy-production
    cancel-in-progress: false

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Deploy via SSH                                                                                  
          uses: appleboy/ssh-action@v1
          with:                                                                                                 
            host: ${{ secrets.VM_HOST }}
            username: ${{ secrets.VM_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script: |
              set -e
              cd /home/Company_Lili_Hotel

              # Pull latest code
              git pull origin main

              # Backend: install dependencies & run migrations
              cd backend
              source venv/bin/activate
              pip install -r requirements.txt
              alembic upgrade head
              deactivate
              cd ..

              # Frontend: build production bundle
              cd frontend
              npm install
              npm run build
              cd ..

              # Restart services
              pm2 restart lili-backend || pm2 start ecosystem.config.js
              pm2 restart lili-line-app || true
