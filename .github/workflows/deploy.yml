name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secrets
        run: |
          echo "VM_HOST length: ${#VM_HOST}"
          echo "VM_USER length: ${#VM_USER}"
          echo "SSH_KEY length: ${#SSH_KEY}"
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH="/home/creative_design/miniconda3/bin:$PATH"
            cd /home/Company_Lili_Hotel

            # Pull latest code
            git pull origin main

            # Backend: install dependencies & run migrations
            cd /home/Company_Lili_Hotel/backend
            pip install -r requirements.txt -q
            alembic upgrade head
            # uvicorn --reload 會自動偵測變更重啟

            # Frontend: build production bundle (nginx serves static)
            cd /home/Company_Lili_Hotel/frontend
            npm install --silent
            npm run build
