name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /data2/lili_hotel
            git pull origin main

            # Backend
            cd /data2/lili_hotel/backend
            /data2/lili_hotel/venv/bin/pip install -r requirements.txt -q
            /data2/lili_hotel/venv/bin/alembic upgrade head
            sudo systemctl restart lili_backend

            # Frontend (nginx serves static build)
            cd /data2/lili_hotel/frontend
            npm install --silent
            npm run build

            # LINE App
            cd /data2/lili_hotel/line_app
            /data2/lili_hotel/venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart mike_app
