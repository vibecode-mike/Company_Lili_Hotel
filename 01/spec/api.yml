  # ============================================================================
  # 新功能 API（FAQ 模組 + AI 聊天機器人）
  # Feature: faq_category_management, faq_rule_management, ai_chatbot_integration
  # ============================================================================

  # --------------------------------------------------------------------------
  # FAQ 大分類管理
  # Feature: faq_category_management
  # --------------------------------------------------------------------------

  /faq/categories:
    get:
      summary: 查詢 FAQ 大分類列表（含啟用狀態、已發布規則數）
      operationId: listFaqCategories
      tags: [FAQ 管理]
      responses:
        '200':
          description: 大分類列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqCategoryListResponse'
        '403':
          description: 未擁有 faq.view 權限

  /faq/categories/{category_id}/toggle:
    patch:
      summary: 啟用或關閉 FAQ 大分類
      operationId: toggleFaqCategory
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active:
                  type: boolean
      responses:
        '200':
          description: 切換成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: 未擁有 faq.manage 權限

  # --------------------------------------------------------------------------
  # FAQ 規則管理
  # Feature: faq_rule_management
  # --------------------------------------------------------------------------

  /faq/categories/{category_id}/rules:
    get:
      summary: 查詢大分類下的規則清單
      operationId: listFaqRules
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 規則清單
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleListResponse'
        '403':
          description: 未擁有 faq.view 權限
    post:
      summary: 在大分類下新增規則（狀態為測試未發佈）
      operationId: createFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaqRuleCreate'
      responses:
        '200':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '400':
          description: 必填欄位未填 或 已達規則上限（20 筆）
        '403':
          description: 未擁有 faq.manage 權限

  /faq/categories/{category_id}/fields:
    get:
      summary: 取得大分類的欄位定義（規則編輯表單使用）
      operationId: getFaqCategoryFields
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 欄位定義清單
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqCategoryFieldListResponse'

  /faq/rules/{rule_id}:
    get:
      summary: 取得單一規則詳細資料（含版本資訊）
      operationId: getFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 規則詳細資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '404':
          description: 規則不存在
    put:
      summary: 編輯規則內容（狀態變為測試未發佈）
      operationId: updateFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaqRuleUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '400':
          description: 必填欄位未填
        '403':
          description: 未擁有 faq.manage 權限
    delete:
      summary: 刪除規則
      operationId: deleteFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: 未擁有 faq.manage 權限

  /faq/rules/{rule_id}/toggle:
    patch:
      summary: 啟用或停用單一規則
      operationId: toggleFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, disabled]
      responses:
        '200':
          description: 切換成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: 未擁有 faq.manage 權限

  /faq/rules/{rule_id}/revert:
    post:
      summary: 將規則恢復為上一個已啟用版本
      operationId: revertFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 恢復成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '400':
          description: 無可回復的版本
        '403':
          description: 未擁有 faq.manage 權限

  /faq/publish:
    post:
      summary: 發佈所有測試未發佈狀態的規則至正式環境
      operationId: publishFaqRules
      tags: [FAQ 管理]
      responses:
        '200':
          description: 發佈成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  published_count:
                    type: integer
                    description: 發佈的規則數量
        '403':
          description: 未擁有 faq.publish 權限

  # --------------------------------------------------------------------------
  # FAQ Token 用量
  # Feature: faq_category_management (Token 用量管理)
  # --------------------------------------------------------------------------

  /faq/token-usage:
    get:
      summary: 查詢 AI Token 用量（已消耗、總額度、可用數量）
      operationId: getFaqTokenUsage
      tags: [FAQ 管理]
      responses:
        '200':
          description: Token 用量資訊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqTokenUsageResponse'
        '403':
          description: 未擁有 faq.view 權限

  # --------------------------------------------------------------------------
  # FAQ 語氣設定
  # Feature: faq_category_management (語氣設定)
  # --------------------------------------------------------------------------

  /faq/tone:
    get:
      summary: 取得當前 AI 語氣設定
      operationId: getFaqTone
      tags: [FAQ 管理]
      responses:
        '200':
          description: 語氣設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqToneResponse'
    put:
      summary: 切換 AI 語氣設定
      operationId: updateFaqTone
      tags: [FAQ 管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tone_type]
              properties:
                tone_type:
                  type: string
                  enum: [professional, casual]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: 未擁有 faq.manage 權限

  # --------------------------------------------------------------------------
  # FAQ 模組授權（系統商後台）
  # Feature: faq_category_management (FAQ 模組授權)
  # --------------------------------------------------------------------------

  /faq/module-auth:
    get:
      summary: 查詢客戶的 FAQ 模組授權狀態
      operationId: getFaqModuleAuth
      tags: [FAQ 管理]
      responses:
        '200':
          description: 模組授權狀態
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqModuleAuthResponse'

  # --------------------------------------------------------------------------
  # 測試聊天
  # Feature: faq_rule_management (測試聊天視窗)
  # --------------------------------------------------------------------------

  /faq/test-chat:
    post:
      summary: 在測試聊天視窗發送提問並取得 AI 回答
      operationId: faqTestChat
      tags: [FAQ 管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, version]
              properties:
                message:
                  type: string
                  description: 使用者提問內容
                version:
                  type: string
                  enum: [test_and_active, active_only]
                  description: 版本一（測試+正式）或版本二（僅正式）
      responses:
        '200':
          description: AI 回答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqTestChatResponse'
        '403':
          description: 未擁有 faq.manage 權限

  # --------------------------------------------------------------------------
  # AI 聊天機器人
  # Feature: ai_chatbot_integration
  # --------------------------------------------------------------------------

  /ai/chat:
    post:
      summary: 渠道 Webhook 呼叫此 API 取得 AI 回答（統一入口）
      operationId: aiChat
      tags: [AI 聊天機器人]
      description: >
        由 LINE App / FB Webhook / Webchat 呼叫，取代渠道端直接呼叫 OpenAI。
        Backend 負責：收集已啟用 FAQ 規則 → 組裝 prompt context → 呼叫 LLM →
        Token 扣減 → 自動貼標 → 轉人工判斷。
        渠道端僅負責接收訊息與發送回覆。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id, message, channel]
              properties:
                member_id:
                  type: integer
                  description: 會員 ID
                message:
                  type: string
                  description: 使用者提問內容
                channel:
                  type: string
                  enum: [line, facebook, webchat]
                  description: 訊息來源渠道
                conversation_id:
                  type: integer
                  description: 對話 ID（用於上下文記憶）
      responses:
        '200':
          description: AI 回答結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiChatResponse'
        '400':
          description: Token 額度不足，渠道端應降級至本地自動回應
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiChatFallbackResponse'

  # --------------------------------------------------------------------------
  # 產業管理（系統商後台）
  # Feature: faq_category_management (產業管理)
  # --------------------------------------------------------------------------

  /admin/industries:
    get:
      summary: 查詢產業清單（系統商後台）
      operationId: listIndustries
      tags: [系統商管理]
      responses:
        '200':
          description: 產業清單
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IndustryDetail'
    post:
      summary: 新增產業（系統商後台）
      operationId: createIndustry
      tags: [系統商管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndustryCreate'
      responses:
        '200':
          description: 建立成功

  /admin/clients/{client_id}/faq-auth:
    post:
      summary: 為客戶開通 FAQ 模組授權（系統商後台）
      operationId: grantFaqModuleAuth
      tags: [系統商管理]
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [industry_id]
              properties:
                industry_id:
                  type: integer
      responses:
        '200':
          description: 開通成功

  /admin/clients/{client_id}/token-quota:
    put:
      summary: 設定客戶 AI Token 額度（系統商後台）
      operationId: setClientTokenQuota
      tags: [系統商管理]
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [total_quota]
              properties:
                total_quota:
                  type: integer
      responses:
        '200':
          description: 設定成功

  # --------------------------------------------------------------------------
  # 管理員權限管理
  # Feature: admin_permission_management
  # --------------------------------------------------------------------------

  /admin/roles:
    get:
      summary: 查詢角色清單
      operationId: listRoles
      tags: [權限管理]
      responses:
        '200':
          description: 角色清單
    post:
      summary: 新增自訂角色
      operationId: createRole
      tags: [權限管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_code, role_name]
              properties:
                role_code:
                  type: string
                role_name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: 建立成功
        '403':
          description: 未擁有 admin.manage 權限

  /admin/roles/{role_code}:
    delete:
      summary: 刪除自訂角色
      operationId: deleteRole
      tags: [權限管理]
      parameters:
        - name: role_code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 刪除成功
        '400':
          description: 系統預設角色無法刪除 或 角色目前有管理員使用
        '403':
          description: 未擁有 admin.manage 權限

  /admin/roles/{role_code}/permissions:
    put:
      summary: 設定角色的權限清單
      operationId: updateRolePermissions
      tags: [權限管理]
      parameters:
        - name: role_code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_codes]
              properties:
                permission_codes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 更新成功
        '403':
          description: 未擁有 admin.manage 權限

  /admin/users/{admin_id}/roles:
    put:
      summary: 為管理員指派角色
      operationId: updateAdminRoles
      tags: [權限管理]
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_codes]
              properties:
                role_codes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 指派成功
        '403':
          description: 未擁有 admin.manage 權限

  /admin/users/{admin_id}/permissions:
    get:
      summary: 取得管理員的最終權限清單（多角色聯集）
      operationId: getAdminPermissions
      tags: [權限管理]
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 權限清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      type: string

# ============================================================================
# Components
# ============================================================================

components:
  schemas:

    # --- 通用 ---

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          default: 200
        message:
          type: string
          default: success
        data:
          type: object
        timestamp:
          type: string
          format: date-time

    PageResponse_MemberListItem:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/MemberListItem'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer
            total_pages:
              type: integer

    # --- 認證 ---

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          default: Bearer
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        last_login_at:
          type: string
          format: date-time

    # --- 會員 ---

    MemberCreate:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
        birthday:
          type: string
          format: date
        email:
          type: string
          format: email
        phone:
          type: string
        id_number:
          type: string
        passport_number:
          type: string
        residence:
          type: string

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
        birthday:
          type: string
          format: date
        email:
          type: string
          format: email
        phone:
          type: string
        id_number:
          type: string
        passport_number:
          type: string
        residence:
          type: string
        internal_note:
          type: string

    MemberListItem:
      type: object
      properties:
        id:
          type: integer
        line_uid:
          type: string
        line_display_name:
          type: string
        line_avatar:
          type: string
        fb_customer_id:
          type: string
        fb_customer_name:
          type: string
        fb_avatar:
          type: string
        webchat_uid:
          type: string
        webchat_name:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        join_source:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagInfo'
        created_at:
          type: string
          format: date-time
        last_interaction_at:
          type: string
          format: date-time
        is_unanswered:
          type: boolean
        unanswered_since:
          type: string
          format: date-time

    MemberDetail:
      allOf:
        - $ref: '#/components/schemas/MemberListItem'
        - type: object
          properties:
            gender:
              type: string
            birthday:
              type: string
              format: date
            id_number:
              type: string
            passport_number:
              type: string
            residence:
              type: string
            receive_notification:
              type: boolean
            gpt_enabled:
              type: boolean
            internal_note:
              type: string

    TagInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string

    UpdateTagsRequest:
      type: object
      required: [tag_names]
      properties:
        tag_names:
          type: array
          items:
            type: string

    BatchUpdateTagsRequest:
      type: object
      properties:
        member_tags:
          type: array
          items:
            type: string
        interaction_tags:
          type: array
          items:
            type: string

    UpdateNotesRequest:
      type: object
      required: [internal_note]
      properties:
        internal_note:
          type: string

    # --- 群發訊息 ---

    MessageCreate:
      type: object
      required: [target_type, schedule_type]
      properties:
        draft_id:
          type: integer
        template_id:
          type: integer
        message_title:
          type: string
