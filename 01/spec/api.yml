  # --------------------------------------------------------------------------
  # 測試聊天
  # Feature: faq_rule_management (測試聊天視窗)
  # --------------------------------------------------------------------------

  /faq/test-chat:
    post:
      summary: 在測試聊天視窗發送提問並取得 AI 回答
      operationId: faqTestChat
      tags: [FAQ 管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: 使用者提問內容
      responses:
        '200':
          description: AI 回答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqTestChatResponse'
        '403':
          description: 未擁有 faq.manage 權限

  # --------------------------------------------------------------------------
  # AI 聊天機器人
  # Feature: ai_chatbot_integration
  # --------------------------------------------------------------------------

  /ai/chat:
    post:
      summary: 渠道 Webhook 呼叫此 API 取得 AI 回答（統一入口）
      operationId: aiChat
      tags: [AI 聊天機器人]
      description: >
        由 LINE App / FB Webhook / Webchat 呼叫，取代渠道端直接呼叫 OpenAI。
        Backend 負責：收集已啟用 FAQ 規則 → 組裝 prompt context → 呼叫 LLM →
        Token 扣減 → 自動貼標 → 轉人工判斷。
        渠道端僅負責接收訊息與發送回覆。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id, message, channel]
              properties:
                member_id:
                  type: integer
                  description: 會員 ID
                message:
                  type: string
                  description: 使用者提問內容
                channel:
                  type: string
                  enum: [line, facebook, webchat]
                  description: 訊息來源渠道
                thread_id:
                  type: string
                  description: 對話串 ID（用於上下文記憶）
      responses:
        '200':
          description: AI 回答結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiChatResponse'
        '400':
          description: Token 額度不足，渠道端應降級至本地自動回應
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiChatFallbackResponse'

