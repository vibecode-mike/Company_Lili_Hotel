          description: Token 用量資訊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqTokenUsageResponse'
        '403':
          description: 未擁有 faq.view 權限
    put:
      summary: 設定 Token 額度
      operationId: updateFaqTokenQuota
      tags: [FAQ 管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [total_quota]
              properties:
                total_quota:
                  type: integer
                  description: Token 總額度
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # --------------------------------------------------------------------------
  # FAQ 語氣設定
  # Feature: faq_category_management (語氣設定)
  # --------------------------------------------------------------------------

  # /faq/tone: REMOVED — 語氣設定為內部實作細節，不納入 API 規格

