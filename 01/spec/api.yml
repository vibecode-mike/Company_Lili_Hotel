  # ============================================================================
  # 新功能 API（FAQ 模組 + AI 聊天機器人）
  # Feature: faq_category_management, faq_rule_management, ai_chatbot_integration
  # ============================================================================

  # --------------------------------------------------------------------------
  # FAQ 大分類管理
  # Feature: faq_category_management
  # --------------------------------------------------------------------------

  /faq/categories:
    get:
      summary: 查詢 FAQ 大分類列表（含啟用狀態、已發布規則數）
      operationId: listFaqCategories
      tags: [FAQ 管理]
      responses:
        '200':
          description: 大分類列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqCategoryListResponse'
        '403':
          description: 未擁有 faq.view 權限

  /faq/categories/{category_id}/toggle:
    patch:
      summary: 啟用或關閉 FAQ 大分類
      operationId: toggleFaqCategory
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active:
                  type: boolean
      responses:
        '200':
          description: 切換成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: 未擁有 faq.manage 權限

  # --------------------------------------------------------------------------
  # FAQ 規則管理
  # Feature: faq_rule_management
  # --------------------------------------------------------------------------

  /faq/categories/{category_id}/rules:
    get:
      summary: 查詢大分類下的規則清單
      operationId: listFaqRules
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 規則清單
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleListResponse'
        '403':
          description: 未擁有 faq.view 權限
    post:
      summary: 在大分類下新增規則（狀態為測試未發佈）
      operationId: createFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaqRuleCreate'
      responses:
        '200':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '400':
          description: 必填欄位未填 或 已達規則上限（20 筆）
        '403':
          description: 未擁有 faq.manage 權限

  # /faq/categories/{category_id}/fields: REMOVED — fields 已內嵌在 category 回應中

  /faq/categories/{category_id}/rules/export:
    get:
      summary: 匯出大分類下所有規則
      operationId: exportFaqRules
      tags: [FAQ 管理]
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 匯出檔案下載
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: 未擁有 faq.manage 權限

  /faq/categories/{category_id}/rules/import:
    post:
      summary: 匯入規則（完全覆蓋該大分類下所有現有規則）
      operationId: importFaqRules
      tags: [FAQ 管理]
      description: |
        匯入後「完全覆蓋」並「刪除」目前該分類下的所有規則，此動作無法還原。
        前端須在呼叫前彈出二次確認視窗。
        支援格式：.csv, .xls, .xlsx。
        匯入成功後前端應自動重新整理（Reload）並顯示「規則匯入成功」。
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 規則檔案（僅接受 .csv, .xls, .xlsx）
      responses:
        '200':
          description: 匯入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported_count:
                    type: integer
                    description: 匯入的規則數量
        '400':
          description: 檔案格式不符或資料驗證失敗
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "檔案格式不符，僅支援 .csv, .xls, .xlsx"
        '403':
          description: 未擁有 faq.manage 權限

  /faq/rules/{rule_id}:
    get:
      summary: 取得單一規則詳細資料（含版本資訊）
      operationId: getFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 規則詳細資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '404':
          description: 規則不存在
    put:
      summary: 編輯規則內容（狀態變為測試未發佈）
      operationId: updateFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaqRuleUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '400':
          description: 必填欄位未填
        '403':
          description: 未擁有 faq.manage 權限
    delete:
      summary: 刪除規則
      operationId: deleteFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: 未擁有 faq.manage 權限

  /faq/rules/{rule_id}/toggle:
    patch:
      summary: 啟用或停用單一規則
      description: |
        停用規則（action=disable）→ status 變為 disabled。
        重新啟用（action=enable）→ status 變為 draft（測試未發佈），
        須透過 POST /faq/publish 發佈後才生效於前台。
      operationId: toggleFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [enable, disable]
                  description: enable → draft；disable → disabled
      responses:
        '200':
          description: 切換成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_id:
                    type: integer
                  status:
                    type: string
                    enum: [draft, disabled]
                    description: enable 後為 draft，disable 後為 disabled
        '403':
          description: 未擁有 faq.manage 權限

  /faq/rules/{rule_id}/publish:
    post:
      summary: 發佈單一規則
      operationId: publishFaqRule
      tags: [FAQ 管理]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 發佈成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqRuleDetail'
        '404':
          description: 規則不存在

  # REMOVED: /faq/rules/{rule_id}/versions 和 /revert 端點已移除。
  # FaqRuleVersion 表於 2026-03-18 遷移刪除，版本管理改用 status + published_at。

  /faq/publish:
    post:
      summary: 發佈所有測試未發佈狀態的規則至正式環境（即時生效，含會員聊天室熱更新）
      operationId: publishFaqRules
      tags: [FAQ 管理]
      description: |
        發佈後規則立即同步至前台聊天機器人及系統內部 AI Chatbot 會員聊天室。
        會員聊天室若有進行中對話，AI 下一次回覆即引用最新規則，
        並在聊天室顯示「規則已更新」提示。
        前端收到 200 後顯示 Toast「發佈成功」。
      responses:
        '200':
          description: 發佈成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  published_count:
                    type: integer
                    description: 發佈的規則數量
        '403':
          description: 未擁有 faq.publish 權限

