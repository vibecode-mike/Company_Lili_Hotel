  # --------------------------------------------------------------------------
  # SSE 即時通訊
  # Feature: 聊天室多渠道
  # 所有渠道（LINE / Facebook / Webchat）統一使用 SSE。
  # 原 WebSocket 端點已於 2026-02 移除（外部代理 HTTP/2 不支援 WS Upgrade）。
  # --------------------------------------------------------------------------

  /sse/chat/{thread_id}:
    get:
      summary: 建立 SSE 連線接收即時聊天訊息（所有渠道）
      operationId: sseChatStream
      tags: [即時通訊]
      description: |
        所有渠道統一使用 SSE（Server-Sent Events）進行即時訊息推送。
        前端使用 EventSource API，原生支援自動重連。
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
            description: 對話 Thread ID（格式：{platform}:{uid}）
      responses:
        '200':
          description: SSE 事件串流
          content:
            text/event-stream:
              schema:
                type: string

  # --------------------------------------------------------------------------
  # LINE 訊息通知 (line_notify)
