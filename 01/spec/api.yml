openapi: 3.0.3
info:
  title: 力麗飯店 LINE OA CRM API
  description: 多渠道會員管理與行銷平台 API，整合 LINE、Facebook Messenger 和 Webchat。
  version: 0.6.0
servers:
  - url: /api/v1
    description: API v1

# ============================================================================
# 既有功能 API（根據現有代碼與 Feature 規格）
# ============================================================================

paths:

  # --------------------------------------------------------------------------
  # 認證授權 (auth)
  # Feature: 登入系統, 登出系統
  # --------------------------------------------------------------------------

  /auth/login:
    post:
      summary: 管理員以帳號密碼登入系統
      operationId: login
      tags: [認證授權]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: 登入成功，回傳 JWT Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: 帳號或密碼錯誤

  /auth/refresh:
    post:
      summary: 使用 refresh token 換發新的 access token
      operationId: refreshToken
      tags: [認證授權]
      responses:
        '200':
          description: 換發成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Token 無效或過期

  /auth/me:
    get:
      summary: 取得當前登入管理員的個人資訊
      operationId: getCurrentUser
      tags: [認證授權]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: 未登入

  # --------------------------------------------------------------------------
  # 會員管理 (members)
  # Feature: member_management, member_search_filter, member_tag_integration
  # --------------------------------------------------------------------------

  /members:
    get:
      summary: 查詢會員清單（支援搜尋、篩選、排序、分頁）
      operationId: getMembers
      tags: [會員管理]
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: 關鍵字搜尋（姓名、電話、Email）
        - name: join_source
          in: query
          schema:
            type: string
            enum: [LINE, facebook, webchat]
          description: 加入來源篩選
        - name: tags
          in: query
          schema:
            type: string
          description: 標籤篩選（逗號分隔）
        - name: channel
          in: query
          schema:
            type: string
          description: 渠道篩選
        - name: sort_by
          in: query
          schema:
            type: string
            default: last_interaction_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 會員清單（分頁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_MemberListItem'
    post:
      summary: 手動建立新會員
      operationId: createMember
      tags: [會員管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreate'
      responses:
        '200':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 資料驗證失敗

  /members/count:
    get:
      summary: 取得符合條件的會員人數
      operationId: getMemberCount
      tags: [會員管理]
      parameters:
        - name: target_audience
          in: query
          schema:
            type: string
        - name: tag_ids
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 會員人數
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}:
    get:
      summary: 取得單一會員詳細資料
      operationId: getMember
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 會員詳細資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberDetail'
        '404':
          description: 會員不存在
    put:
      summary: 編輯會員基本資料
      operationId: updateMember
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: 會員不存在
    delete:
      summary: 刪除會員帳號
      operationId: deleteMember
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: 會員不存在

  /members/{member_id}/tags:
    put:
      summary: 更新會員的標籤（覆蓋）
      operationId: updateMemberTags
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/tags/add:
    post:
      summary: 為會員新增單一標籤
      operationId: addMemberTag
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag_name]
              properties:
                tag_name:
                  type: string
                message_id:
                  type: integer
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/tags/batch-update:
    post:
      summary: 批次更新會員的會員標籤與互動標籤
      operationId: batchUpdateMemberTags
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUpdateTagsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/interaction-tags:
    put:
      summary: 更新會員的互動標籤（覆蓋）
      operationId: updateMemberInteractionTags
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/interaction-tags/add:
    post:
      summary: 為會員新增單一互動標籤
      operationId: addMemberInteractionTag
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag_name]
              properties:
                tag_name:
                  type: string
                message_id:
                  type: integer
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/notes:
    put:
      summary: 更新會員備註
      operationId: updateMemberNotes
      tags: [會員管理]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotesRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/human-override:
    put:
      summary: 設定/解除人工接管狀態（抑制所有自動回應）
      operationId: setHumanOverride
      tags: [會員管理]
      description: |
        管理者 focus 輸入框時 active=true（設定 10 分鐘），blur 時 active=false（設定 30 秒緩衝）。
        時間戳自然過期，不需主動清除。送訊息時後端自動續期。
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
            enum: [LINE, Facebook, Webchat]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
                  description: true=啟動人工接管(10min), false=縮短為30秒緩衝
      responses:
        '200':
          description: 設定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/chat/send:
    post:
      summary: 從 CRM 後台發送聊天訊息給會員
      operationId: sendMemberChatMessage
      tags: [聊天室]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, platform]
              properties:
                text:
                  type: string
                platform:
                  type: string
                  enum: [LINE, facebook, webchat]
                jwt_token:
                  type: string
                page_id:
                  type: string
                fb_customer_id:
                  type: string
      responses:
        '200':
          description: 發送成功

  /members/{member_id}/chat/mark-read:
    put:
      summary: 標記會員對話為已讀
      operationId: markMemberChatRead
      tags: [聊天室]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 標記成功

  /members/{member_id}/chat-messages:
    get:
      summary: 取得會員的聊天訊息歷史
      operationId: getChatMessages
      tags: [聊天室]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
        - name: jwt_token
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: 聊天訊息清單
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /members/{member_id}/chat-session:
    get:
      summary: 取得會員的聊天 session 資訊
      operationId: getChatSession
      tags: [聊天室]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 聊天 session 資訊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # --------------------------------------------------------------------------
  # 群發訊息 (messages)
  # Feature: create_broadcast, 多渠道推播, message_history, message_analytics
  # --------------------------------------------------------------------------

  /messages:
    get:
      summary: 查詢群發訊息清單（支援篩選、分頁）
      operationId: listMessages
      tags: [群發訊息]
      parameters:
        - name: send_status
          in: query
          schema:
            type: string
            enum: [draft, scheduled, sent, failed]
        - name: search
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 訊息清單（分頁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
    post:
      summary: 建立群發訊息（草稿或排程）
      operationId: createMessage
      tags: [群發訊息]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreate'
      responses:
        '200':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDetail'
        '400':
          description: 資料驗證失敗

  /messages/quota:
    post:
      summary: 查詢推播配額狀態（預估發送人數與可用額度）
      operationId: getQuotaStatus
      tags: [群發訊息]
      parameters:
        - name: channel_id
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotaStatusRequest'
      responses:
        '200':
          description: 配額狀態
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaStatusResponse'

  /messages/{message_id}:
    get:
      summary: 取得單一群發訊息詳細資料
      operationId: getMessage
      tags: [群發訊息]
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 訊息詳細資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDetail'
        '404':
          description: 訊息不存在
    put:
      summary: 更新群發訊息內容
      operationId: updateMessage
      tags: [群發訊息]
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDetail'
    delete:
      summary: 刪除群發訊息
      operationId: deleteMessage
      tags: [群發訊息]
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /messages/{message_id}/send:
    post:
      summary: 發送群發訊息（立即或排程觸發）
      operationId: sendMessage
      tags: [群發訊息]
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageSendRequest'
      responses:
        '200':
          description: 發送結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageSendResponse'
        '400':
          description: 發送失敗（配額不足等）

  /messages/fb/{fb_message_id}:
    get:
      summary: 取得 Facebook 群發訊息詳細資料
      operationId: getFbMessageDetail
      tags: [群發訊息]
      parameters:
        - name: fb_message_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: FB 訊息詳細資料

  # --------------------------------------------------------------------------
  # 模板庫 (templates)
  # Feature: message_template, template_library, carousel_auto_recrop
  # --------------------------------------------------------------------------

  /templates/library:
    get:
      summary: 查詢模板庫清單
      operationId: listLibraryTemplates
      tags: [模板庫]
      parameters:
        - name: sort_by
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 模板庫清單
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateLibraryItem'

  /templates/{template_id}/copy:
    post:
      summary: 複製模板
      operationId: copyTemplate
      tags: [模板庫]
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 複製成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateCopyResponse'

  /templates/{template_id}/library:
    put:
      summary: 切換模板是否加入模板庫
      operationId: toggleLibrary
      tags: [模板庫]
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateLibraryToggle'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateLibraryItem'

  # --------------------------------------------------------------------------
  # 活動管理 (campaigns)
  # Feature: campaign_management (活動 CRUD), create_broadcast (活動關聯)
  # --------------------------------------------------------------------------

  /campaigns:
    post:
      summary: 建立行銷活動
      operationId: createCampaign
      tags: [活動管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreateNew'
      responses:
        '200':
          description: 建立成功
    get:
      summary: 查詢活動清單（支援篩選、分頁）
      operationId: listCampaigns
      tags: [活動管理]
      parameters:
        - name: campaign_tag
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 活動清單

  /campaigns/{campaign_id}:
    get:
      summary: 取得單一活動詳細資料
      operationId: getCampaign
      tags: [活動管理]
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 活動詳細資料
        '404':
          description: 活動不存在
    put:
      summary: 更新活動資料
      operationId: updateCampaign
      tags: [活動管理]
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdateNew'
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 刪除活動
      operationId: deleteCampaign
      tags: [活動管理]
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 刪除成功

  # --------------------------------------------------------------------------
  # 標籤管理 (tags)
  # Feature: member_tag_management, interaction_tag_setup, label_statistics
  # --------------------------------------------------------------------------

  /tags:
    get:
      summary: 查詢標籤清單（支援類型篩選、搜尋、排序、分頁）
      operationId: getTags
      tags: [標籤管理]
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [member, interaction]
        - name: source
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            default: trigger_count
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 標籤清單（分頁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      summary: 建立新標籤
      operationId: createTag
      tags: [標籤管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '200':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
