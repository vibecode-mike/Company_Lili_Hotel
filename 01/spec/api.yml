  # --------------------------------------------------------------------------
  # Facebook WebSocket 代理 (fb_ws_proxy)
  # 前端透過後端代理與外部 FB API 建立 WebSocket 連線（此為 FB 外部 API 代理，非聊天室即時通訊）
  # --------------------------------------------------------------------------

  /fb-ws-proxy/start:
    post:
      summary: 啟動 FB WebSocket 代理連線
      operationId: startFbWsProxy
      tags: [Facebook WS Proxy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fb_customer_id, page_id, jwt_token, thread_id]
              properties:
                fb_customer_id:
                  type: string
                page_id:
                  type: string
                jwt_token:
                  type: string
                thread_id:
                  type: string
      responses:
        '200':
          description: 代理連線已啟動
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  /fb-ws-proxy/stop:
    post:
      summary: 停止 FB WebSocket 代理連線
      operationId: stopFbWsProxy
      tags: [Facebook WS Proxy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fb_customer_id, page_id]
              properties:
                fb_customer_id:
                  type: string
                page_id:
                  type: string
      responses:
        '200':
          description: 代理連線已停止
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  stopped:
                    type: boolean

  /fb-ws-proxy/send:
    post:
      summary: 透過 WebSocket 代理發送 Facebook 訊息
      operationId: sendFbWsProxyMessage
      tags: [Facebook WS Proxy]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fb_customer_id, page_id, text]
              properties:
                fb_customer_id:
                  type: string
                page_id:
                  type: string
                text:
                  type: string
      responses:
        '200':
          description: 訊息發送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '503':
          description: WebSocket 代理發送失敗

